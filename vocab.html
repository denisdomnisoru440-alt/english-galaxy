<!DOCTYPE html>
<html lang="en" translate="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="English Galaxy">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0a0e1a">
<meta name="mobile-web-app-capable" content="yes">
<meta name="google" content="notranslate">
<meta name="application-name" content="English Galaxy">
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%F0%9F%93%96%3C/text%3E%3C/svg%3E">
<title>English Galaxy</title>
<script>if('serviceWorker'in navigator)navigator.serviceWorker.register('sw.js').catch(function(){})</script>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0a0e1a;color:#e2e8f0;height:100dvh;overflow:hidden;display:flex;flex-direction:column}
body.light{background:#f5f7fa;color:#1e293b}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-thumb{background:#6366f1;border-radius:4px}
.hdr{padding:12px 16px;display:flex;align-items:center;gap:8px;border-bottom:1px solid rgba(99,102,241,.12);flex-shrink:0}
.hdr .logo{font-size:15px;font-weight:800;color:#6366f1}
.hdr .spc{flex:1}
.hdr .tb{background:none;border:none;color:#6366f1;font-size:18px;cursor:pointer;padding:6px;border-radius:8px}
.hdr .tb:hover{background:rgba(99,102,241,.1)}
.scr{flex:1;overflow-y:auto;padding:12px 14px;padding-bottom:calc(70px + env(safe-area-inset-bottom))}
.page{display:none}.page.on{display:block}
/* Nav */
.bnav{position:fixed;bottom:0;left:0;right:0;background:rgba(10,14,26,.95);backdrop-filter:blur(16px);border-top:1px solid rgba(99,102,241,.1);display:flex;z-index:100;padding-bottom:env(safe-area-inset-bottom)}
.bnav a{flex:1;text-align:center;padding:8px 2px 4px;color:#4a5568;text-decoration:none;font-size:9px;font-weight:600;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:2px}
.bnav a.act{color:#6366f1}
.bnav a .ic{font-size:20px}
body.light .bnav{background:rgba(245,247,250,.95);border-color:rgba(0,0,0,.06)}
/* Categories */
.cats{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:10px}
.cat{border:none;padding:6px 14px;border-radius:20px;font-size:11px;font-weight:700;cursor:pointer;color:#fff;opacity:.5;transition:all .2s}
.cat:hover{opacity:.8}
.cat.act{opacity:1;box-shadow:0 2px 12px rgba(99,102,241,.25)}
/* Search */
.srch{margin-bottom:10px}
.srch input{width:100%;background:rgba(255,255,255,.05);border:1px solid rgba(99,102,241,.12);border-radius:12px;color:#e2e8f0;font-size:14px;padding:10px 14px;outline:none}
.srch input:focus{border-color:#6366f1}
.srch input::placeholder{color:#4a5568}
body.light .srch input{background:rgba(0,0,0,.03);border-color:rgba(0,0,0,.1);color:#1e293b}
/* Words */
.wr{margin-bottom:8px}
.cnt{font-size:10px;color:#4a5568;margin-bottom:4px;padding:0 2px}
.wi{display:flex;align-items:center;padding:12px 14px;border-radius:12px;margin-bottom:4px;cursor:pointer;transition:all .2s;background:rgba(255,255,255,.03);border:1px solid rgba(99,102,241,.06)}
.wi:hover{border-color:rgba(99,102,241,.15);background:rgba(99,102,241,.04)}
.wi.act{background:rgba(99,102,241,.08);border-color:rgba(99,102,241,.2)}
.wi .we{font-weight:700;color:#e2e8f0;font-size:15px}
.wi .phon{font-size:11px;color:#64748b;margin-left:6px;font-style:italic}
.wi .tr{flex:1;text-align:right;font-size:13px;color:#10b981;margin-left:12px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.wi .tr::before{content:"— ";opacity:.4}
.wi .spk{background:none;border:none;color:#6366f1;font-size:14px;cursor:pointer;padding:2px 4px;flex-shrink:0}
body.light .wi{background:rgba(255,255,255,.6);border-color:rgba(0,0,0,.06)}
body.light .wi .we{color:#1e293b}
body.light .srch input{color:#1e293b}
/* Detail */
.det{background:rgba(255,255,255,.03);border:1px solid rgba(99,102,241,.1);border-radius:14px;padding:16px;margin-bottom:8px}
body.light .det{background:rgba(0,0,0,.02);border-color:rgba(0,0,0,.08)}
.det .w{font-size:22px;font-weight:800}
.det .lv{font-size:9px;color:#6366f1;margin-bottom:6px;font-weight:700;letter-spacing:.08em}
.det .tr{font-size:14px;color:#10b981}
.det .rt{font-size:12px;color:#64748b;margin-top:4px;font-style:italic}
.det .sep{height:1px;background:rgba(99,102,241,.1);margin:10px 0}
/* Quiz */
.qbar{background:rgba(99,102,241,.1);height:4px;border-radius:4px;margin-bottom:10px}
.qbarf{height:4px;border-radius:4px;background:linear-gradient(90deg,#6366f1,#10b981);transition:width .4s}
.qcard{background:rgba(255,255,255,.03);border:1px solid rgba(99,102,241,.1);border-radius:16px;padding:20px;text-align:center;min-height:180px;display:flex;flex-direction:column;align-items:center;justify-content:center}
body.light .qcard{background:rgba(255,255,255,.7);border-color:rgba(0,0,0,.08)}
.qbadge{display:inline-block;padding:4px 12px;border-radius:20px;font-size:10px;color:#fff;margin-bottom:8px;font-weight:700}
.qword{font-size:26px;font-weight:800;margin-bottom:6px}
.qtrans{background:rgba(16,185,129,.08);border:1px solid rgba(16,185,129,.15);border-radius:12px;padding:12px;margin:6px 0;font-size:14px;color:#10b981;width:100%;display:none}
.qtrans.show{display:block}
.qbtns{display:flex;gap:6px;margin-top:10px;flex-wrap:wrap;justify-content:center}
.qbtn{border:none;border-radius:12px;font-size:13px;font-weight:700;padding:10px 18px;cursor:pointer;color:#fff;transition:all .15s}
.qbtn:hover{transform:translateY(-1px)}
.qbtn.correct{background:#10b981}
.qbtn.wrong{background:#ef4444}
.qbtn.idle{background:#6366f1}
.qflip{background:#6366f1;border:none;border-radius:12px;color:#fff;font-size:13px;font-weight:700;padding:12px 24px;cursor:pointer;margin-top:8px}
.qstart{text-align:center;padding:20px 0}
.qstart h2{font-size:20px;margin-bottom:8px}
.qstart p{color:#64748b;font-size:13px;margin-bottom:16px}
.qstart button{background:linear-gradient(135deg,#6366f1,#10b981);border:none;border-radius:12px;color:#fff;font-size:14px;font-weight:700;padding:12px 32px;cursor:pointer}
/* Typing game */
.type-input{width:100%;background:rgba(255,255,255,.04);border:2px solid rgba(99,102,241,.15);border-radius:12px;color:#e2e8f0;font-size:18px;font-weight:700;padding:12px;text-align:center;outline:none;font-family:inherit}
.type-input:focus{border-color:#6366f1}
.type-input.correct{border-color:#10b981;background:rgba(16,185,129,.06)}
.type-input.wrong{border-color:#ef4444;background:rgba(239,68,68,.06)}
.type-hint{font-size:11px;color:#64748b;margin-top:6px}
.type-hint span{color:#6366f1;font-weight:600}
/* Grammar */
.g-item{background:rgba(255,255,255,.03);border:1px solid rgba(99,102,241,.08);border-radius:12px;margin-bottom:6px;overflow:hidden}
.g-item .g-hdr{padding:12px 14px;cursor:pointer;display:flex;align-items:center;justify-content:space-between}
.g-item .g-hdr:hover{background:rgba(99,102,241,.04)}
.g-item .g-title{font-size:14px;font-weight:700;color:#e2e8f0}
.g-item .g-lvl{font-size:10px;color:#6366f1;font-weight:600}
.g-item .g-arrow{color:#64748b;transition:transform .2s}
.g-item.open .g-arrow{transform:rotate(180deg)}
.g-item .g-body{padding:0 14px 14px;display:none;font-size:13px;color:#94a3b8;line-height:1.6}
.g-item.open .g-body{display:block}
.gf-box{background:rgba(99,102,241,.05);border:1px solid rgba(99,102,241,.1);border-radius:10px;padding:10px 12px;margin-bottom:6px}
.gf-box.gf-pos{border-color:rgba(16,185,129,.15);background:rgba(16,185,129,.04)}
.gf-box.gf-neg{border-color:rgba(239,68,68,.12);background:rgba(239,68,68,.03)}
.gf-box.gf-qst{border-color:rgba(245,158,11,.12);background:rgba(245,158,11,.03)}
.gf-label{font-size:9px;font-weight:700;color:#6366f1;text-transform:uppercase;letter-spacing:.06em;margin-bottom:3px}
.gf-val{font-size:12px;color:#e2e8f0;line-height:1.5}
body.light .g-item{background:rgba(0,0,0,.02);border-color:rgba(0,0,0,.06)}
body.light .g-item .g-title{color:#1e293b}
/* Me / dict */
.me-stats{display:flex;gap:6px;margin-bottom:12px}
.me-stat{flex:1;background:rgba(255,255,255,.03);border:1px solid rgba(99,102,241,.08);border-radius:10px;padding:10px 8px;text-align:center}
.me-stat .ms-n{font-size:18px;font-weight:800;color:#6366f1}
.me-stat .ms-l{font-size:9px;color:#64748b;margin-top:2px}
body.light .me-stat{background:rgba(0,0,0,.02);border-color:rgba(0,0,0,.06)}
.note-item{background:rgba(255,255,255,.03);border:1px solid rgba(99,102,241,.06);border-radius:10px;padding:12px;margin-bottom:6px;border-left:3px solid #6366f1}
.note-item .n-txt{font-size:13px;line-height:1.5;white-space:pre-wrap}
.note-item .n-dt{font-size:9px;color:#4a5568;margin-top:4px}
.note-item .n-del{background:none;border:none;color:#ef4444;font-size:12px;cursor:pointer;float:right}
.note-add{background:linear-gradient(135deg,#6366f1,#10b981);border:none;border-radius:12px;color:#fff;font-size:13px;font-weight:700;padding:10px;cursor:pointer;width:100%;margin-top:8px}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:999;display:flex;align-items:center;justify-content:center}
.modal-box{background:#111827;border:1px solid rgba(99,102,241,.15);border-radius:16px;padding:16px;max-width:400px;width:90%}
.modal-box textarea{width:100%;min-height:120px;background:rgba(255,255,255,.05);border:1px solid rgba(99,102,241,.15);border-radius:10px;color:#e2e8f0;font-size:14px;padding:10px;outline:none;resize:vertical;font-family:inherit}
.modal-box .mbtns{display:flex;gap:6px;margin-top:8px}
.modal-box .mbtn{flex:1;border:none;border-radius:10px;font-size:12px;font-weight:700;padding:8px;cursor:pointer}
.modal-box .mbtn.save{background:#6366f1;color:#fff}
.modal-box .mbtn.cancel{background:rgba(255,255,255,.06);color:#94a3b8}
body.light .modal-box{background:#f1f5f9;border-color:rgba(0,0,0,.1)}
body.light .modal-box textarea{background:rgba(0,0,0,.03);color:#1e293b;border-color:rgba(0,0,0,.1)}
body.light .note-item{background:rgba(255,255,255,.6);border-color:rgba(0,0,0,.06)}
body.light .note-item .n-txt{color:#1e293b}
body.light .me-stat{background:rgba(255,255,255,.5);border-color:rgba(0,0,0,.06)}
/* Theme picker */
.tp-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:999;display:flex;align-items:center;justify-content:center}
.tp-box{background:#111827;border:1px solid rgba(99,102,241,.15);border-radius:16px;padding:16px;max-width:280px;width:90%;text-align:center}
.tp-box h3{font-size:14px;margin-bottom:2px}
.tp-box p{font-size:11px;color:#64748b;margin-bottom:12px}
.tp-grid{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin-bottom:12px}
.tp-dot{width:36px;height:36px;border-radius:50%;cursor:pointer;border:3px solid transparent;transition:all .2s}
.tp-dot:hover{transform:scale(1.15)}
.tp-dot.sel{border-color:#fff;box-shadow:0 0 12px rgba(99,102,241,.4)}
.tp-close{background:#6366f1;border:none;border-radius:10px;color:#fff;font-size:12px;font-weight:700;padding:8px 18px;cursor:pointer}
body.light .tp-box{background:#f1f5f9}
body.light .tp-box h3{color:#1e293b}
</style>
</head>
<body>
<div class="hdr">
<span class="logo">English Galaxy</span>
<div class="spc"></div>
<button class="tb" onclick="openThemePicker()">&#127912;</button>
</div>
<div class="scr">
<div class="page on" id="browse"></div>
<div class="page" id="quiz"></div>
<div class="page" id="games"></div>
<div class="page" id="grammar"></div>
<div class="page" id="me"></div>
</div>
<div class="bnav" id="bnav">
<a class="act" data-tab="browse" onclick="switchTab('browse')"><span class="ic">&#128214;</span>Browse</a>
<a data-tab="quiz" onclick="switchTab('quiz')"><span class="ic">&#9989;</span>Quiz</a>
<a data-tab="games" onclick="switchTab('games')"><span class="ic">&#9999;</span>Type</a>
<a data-tab="grammar" onclick="switchTab('grammar')"><span class="ic">&#128218;</span>Grammar</a>
<a data-tab="me" onclick="switchTab('me')"><span class="ic">&#128100;</span>Me</a>
</div>

function getCat(id){for(var i=0;i<G.length;i++){if(G[i].id===id)return G[i]}return null}
function getGrammarCat(){return getCat('Grammar')}
function lsGet(k,d){try{var v=localStorage.getItem(k);return v!==null?v:d}catch(e){return d}}
function lsSet(k,v){try{localStorage.setItem(k,v);return true}catch(e){return false}}
function lsGetObj(k,d){try{return JSON.parse(lsGet(k,null))||d}catch(e){return d}}
function lsSetObj(k,v){try{return lsSet(k,JSON.stringify(v))}catch(e){return false}}
function lsRemove(k){try{localStorage.removeItem(k);return true}catch(e){return false}}

var CC={"A1":"#10b981","A2":"#22c55e","B1":"#eab308","B2":"#f97316","C1":"#ef4444","C2":"#a855f7","Grammar":"#6366f1","Phrasal Verbs":"#06b6d4"};
var curCat=null,curQuizCat=null,curTab='browse';

function getKnownMap(){return lsGetObj('eg_known',{})}
function saveKnownMap(m){lsSetObj('eg_known',m)}
function getKnown(w,g){var m=getKnownMap();return m[g+'::'+w]||false}
function setKnown(w,g,v){var m=getKnownMap();if(v)m[g+'::'+w]=1;else delete m[g+'::'+w];saveKnownMap(m)}

function speak(t){if(!t)return;try{var u=new SpeechSynthesisUtterance(t);u.lang='en-US';u.rate=0.85;u.pitch=1;speechSynthesis.speak(u)}catch(e){}}

function switchTab(t){
  curTab=t;
  var tabs=document.querySelectorAll('.bnav a');
  for(var i=0;i<tabs.length;i++){
    tabs[i].classList.toggle('act',tabs[i].getAttribute('data-tab')===t);
  }
  var pages=document.querySelectorAll('.page');
  for(var i=0;i<pages.length;i++){
    pages[i].classList.toggle('on',pages[i].id===t);
  }
  if(t==='browse')renderBrowse();
  else if(t==='quiz')renderQuizStart();
  else if(t==='games')renderTyping();
  else if(t==='grammar')renderGrammar();
  else if(t==='me')renderMe();
}

/* ====== BROWSE ====== */
function renderBrowse(){
  var el=document.getElementById('browse');
  var h='<div class="cats">';
  for(var i=0;i<G.length;i++){
    var c=G[i];
    h+='<button class="cat'+(curCat===c.id?' act':'')+'" style="background:'+(CC[c.id]||'#6366f1')+'" onclick="pickCat(\''+c.id+'\')">'+c.id+'</button>';
  }
  h+='</div>';
  h+='<div class="srch"><input type="text" id="bsrc" placeholder="Search words..." oninput="renderWordList()"></div>';
  h+='<div id="wlist"></div>';
  h+='<div id="wdetail"></div>';
  el.innerHTML=h;
  renderWordList();
}

function pickCat(id){curCat=curCat===id?null:id;renderBrowse()}

function renderWordList(){
  var el=document.getElementById('wlist');
  if(!el)return;
  var q=(document.getElementById('bsrc')||{}).value||'';
  q=q.toLowerCase();
  var h='';
  var cats=curCat?[getCat(curCat)]:G;
  var total=0;
  for(var ci=0;ci<cats.length;ci++){
    var c=cats[ci];if(!c)continue;
    var words=c.words;
    var shown=0;
    var wh='';
    for(var i=0;i<words.length;i++){
      var w=words[i];
      var en=w[0],tr=w[1];
      if(q&&en.toLowerCase().indexOf(q)===-1&&tr.toLowerCase().indexOf(q)===-1)continue;
      var ph=(tr.match(/\[([^\]]+)\]/)||[])[1]||'';
      var shortTr=tr.split('—')[0].trim();
      wh+='<div class="wi" onclick="showDetail('+ci+','+i+')">';
      wh+='<span class="we">'+en+'</span>';
      if(ph)wh+='<span class="phon">'+ph+'</span>';
      wh+='<span class="spk" onclick="event.stopPropagation();speak(\''+en.replace(/'/g,"\\'")+'\')">&#128266;</span>';
      wh+='<span class="tr">'+shortTr+'</span>';
      wh+='</div>';
      shown++;
    }
    if(shown>0){
      h+='<div class="cnt">'+c.id+' ('+shown+')</div><div class="wr">'+wh+'</div>';
      total+=shown;
    }
  }
  if(!total)h='<div style="text-align:center;color:#4a5568;padding:30px">No words found</div>';
  el.innerHTML=h;
}

function showDetail(ci,wi){
  var c=G[ci];if(!c)return;
  var w=c.words[wi];
  var en=w[0],tr=w[1];
  var ph=(tr.match(/\[([^\]]+)\]/)||[])[1]||'';
  var translit=(tr.match(/\(([^)]+)\)/)||[])[1]||'';
  var shortTr=tr.split('—')[0].trim();
  var isK=getKnown(en,c.id);
  var h='<div class="det">';
  h+='<div style="display:flex;align-items:center;gap:8px">';
  h+='<span class="w">'+en+'</span>';
  h+='<span class="spk" onclick="speak(\''+en.replace(/'/g,"\\'")+'\')">&#128266;</span>';
  h+='</div>';
  h+='<div class="lv">'+c.id+(ph?' &middot; '+ph:'')+'</div>';
  h+='<div class="tr">'+shortTr+'</div>';
  if(translit)h+='<div class="rt">'+translit+'</div>';
  h+='<div class="sep"></div>';
  h+='<div style="display:flex;gap:6px">';
  h+='<button style="flex:1;border:none;border-radius:10px;padding:8px;font-size:12px;font-weight:700;cursor:pointer;background:'+(isK?'rgba(16,185,129,.15)':'rgba(99,102,241,.1)')+';color:'+(isK?'#10b981':'#6366f1')+'" onclick="toggleKnown(\''+en.replace(/'/g,"\\'")+"','"+c.id.replace(/'/g,"\\'")+'\')">'+(isK?'&#10003; Known':'Mark Known')+'</button>';
  h+='</div></div>';
  document.getElementById('wdetail').innerHTML=h;
  document.getElementById('wlist').style.display='none';
}

function toggleKnown(w,g){
  setKnown(w,g,!getKnown(w,g));
  document.getElementById('wlist').style.display='';
  renderBrowse();
  document.getElementById('wdetail').innerHTML='';
}

/* ====== QUIZ ====== */
var qWords=[],qIdx=0,qScore=0,qAnswered=false;

function renderQuizStart(){
  var el=document.getElementById('quiz');
  var h='<div class="cats">';
  for(var i=0;i<G.length;i++){
    var c=G[i];if(c.id==='Grammar')continue;
    h+='<button class="cat'+(curQuizCat===c.id?' act':'')+'" style="background:'+(CC[c.id]||'#6366f1')+'" onclick="pickQuizCat(\''+c.id+'\')">'+c.id+'</button>';
  }
  h+='</div>';
  h+='<div class="qstart"><h2>Quiz</h2><p>Pick a level, then test yourself!</p>';
  h+='<button onclick="startQuiz()">Start Quiz</button></div>';
  h+='<div id="qarea"></div>';
  el.innerHTML=h;
}

function pickQuizCat(id){curQuizCat=curQuizCat===id?null:id;renderQuizStart()}

function startQuiz(){
  var pool=[];
  var cats=curQuizCat?[getCat(curQuizCat)]:G;
  for(var ci=0;ci<cats.length;ci++){
    var c=cats[ci];if(!c||c.id==='Grammar')continue;
    for(var i=0;i<c.words.length;i++){
      var raw=c.words[i][1];
      var ph=(raw.match(/\[([^\]]+)\]/)||[])[1]||'';
      pool.push({en:c.words[i][0],tr:raw.split('—')[0].trim(),ph:ph,cat:c.id});
    }
  }
  if(pool.length<4){document.getElementById('qarea').innerHTML='<div style="text-align:center;color:#64748b;padding:20px">Need at least 4 words</div>';return}
  shuffle(pool);
  qWords=pool.slice(0,Math.min(20,pool.length));
  qIdx=0;qScore=0;showQuestion();
}

function showQuestion(){
  if(qIdx>=qWords.length){showQuizResult();return}
  var w=qWords[qIdx];
  var opts=getOpts(w,4);
  var pct=Math.round(qIdx/qWords.length*100);
  var h='<div class="qbar"><div class="qbarf" style="width:'+pct+'%"></div></div>';
  h+='<div style="display:flex;justify-content:space-between;font-size:10px;color:#64748b;margin-bottom:8px"><span>'+(qIdx+1)+'/'+qWords.length+'</span><span>Score: '+qScore+'</span></div>';
  h+='<div class="qcard">';
  h+='<div class="qbadge" style="background:'+(CC[w.cat]||'#6366f1')+'">'+w.cat+'</div>';
  h+='<div class="qword">'+w.en+'</div>';
  if(w.ph)h+='<div style="font-size:13px;color:#64748b;margin-bottom:6px;font-style:italic">'+w.ph+'</div>';
  h+='<button class="spk" onclick="speak(\''+w.en.replace(/'/g,"\\'")+'\')">&#128266;</button>';
  h+='<div class="qbtns">';
  for(var i=0;i<opts.length;i++){
    h+='<button class="qbtn idle" id="qb'+i+'" onclick="answer('+i+',\''+w.en.replace(/'/g,"\\'")+"','"+opts[i].replace(/'/g,"\\'")+'\')">'+opts[i]+'</button>';
  }
  h+='</div></div>';
  document.getElementById('qarea').innerHTML=h;
  qAnswered=false;
}

function answer(i,en,ans){
  if(qAnswered)return;
  qAnswered=true;
  var correct=ans===qWords[qIdx].tr;
  if(correct)qScore++;
  var btn=document.getElementById('qb'+i);
  btn.className='qbtn '+(correct?'correct':'wrong');
  if(!correct){
    for(var j=0;j<4;j++){
      if(document.getElementById('qb'+j).textContent===qWords[qIdx].tr){
        document.getElementById('qb'+j).className='qbtn correct';
      }
    }
  }
  setTimeout(function(){qIdx++;showQuestion()},800);
}

function showQuizResult(){
  var pct=Math.round(qScore/qWords.length*100);
  var h='<div class="qcard">';
  h+='<div style="font-size:40px;margin-bottom:8px">'+(pct>=80?'&#127881;':pct>=50?'&#128170;':'&#128176;')+'</div>';
  h+='<div style="font-size:24px;font-weight:800;margin-bottom:4px">'+qScore+'/'+qWords.length+'</div>';
  h+='<div style="font-size:14px;color:#64748b;margin-bottom:12px">'+pct+'% correct</div>';
  h+='<button class="qflip" onclick="renderQuizStart()">Play Again</button>';
  h+='</div>';
  document.getElementById('qarea').innerHTML=h;
}

function getOpts(w,n){
  var pool=[];
  var cats=G;
  for(var ci=0;ci<cats.length;ci++){
    var c=cats[ci];if(c.id==='Grammar')continue;
    for(var i=0;i<c.words.length;i++){
      var t=c.words[i][1].split('—')[0].trim();
      if(t!==w.tr)pool.push(t);
    }
  }
  shuffle(pool);
  var opts=[w.tr];
  for(var i=0;i<pool.length&&opts.length<n;i++)opts.push(pool[i]);
  shuffle(opts);
  return opts;
}

function shuffle(a){for(var i=a.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=a[i];a[i]=a[j];a[j]=t}}

/* ====== TYPING GAME ====== */
var tw=[],ti=0,tscore=0;

function renderTyping(){
  var el=document.getElementById('games');
  var pool=[];
  for(var ci=0;ci<G.length;ci++){
    var c=G[ci];if(c.id==='Grammar'||c.id==='Phrasal Verbs')continue;
    for(var i=0;i<Math.min(5,c.words.length);i++){
      var raw=c.words[i][1];
      var ph=(raw.match(/\[([^\]]+)\]/)||[])[1]||'';
      pool.push({en:c.words[i][0],tr:raw.split('—')[0].trim(),ph:ph,cat:c.id});
    }
  }
  shuffle(pool);
  tw=pool.slice(0,15);ti=0;tscore=0;
  showTypeWord();
}

function showTypeWord(){
  var el=document.getElementById('games');
  if(ti>=tw.length){
    var h='<div class="qcard"><div style="font-size:36px;margin-bottom:8px">&#127942;</div>';
    h+='<div style="font-size:22px;font-weight:800;margin-bottom:4px">'+tscore+'/'+tw.length+'</div>';
    h+='<div style="color:#64748b;font-size:13px;margin-bottom:12px">words typed correctly</div>';
    h+='<button class="qflip" onclick="renderTyping()">Play Again</button></div>';
    el.innerHTML=h;return;
  }
  var w=tw[ti];
  var pct=Math.round(ti/tw.length*100);
  var h='<div class="qbar"><div class="qbarf" style="width:'+pct+'%"></div></div>';
  h+='<div style="display:flex;justify-content:space-between;font-size:10px;color:#64748b;margin-bottom:8px"><span>'+(ti+1)+'/'+tw.length+'</span><span>Score: '+tscore+'</span></div>';
  h+='<div class="qcard">';
  h+='<div class="qbadge" style="background:'+(CC[w.cat]||'#6366f1')+'">'+w.cat+'</div>';
  h+='<div style="font-size:16px;color:#10b981;margin-bottom:4px">'+w.tr+'</div>';
  if(w.ph)h+='<div style="font-size:12px;color:#64748b;margin-bottom:12px;font-style:italic">'+w.ph+'</div>';
  else h+='<div style="margin-bottom:12px"></div>';
  h+='<input class="type-input" id="tinp" placeholder="Type the word..." autofocus onkeydown="if(event.key===\'Enter\')checkType()">';
  h+='<div class="type-hint">Press <span>Enter</span> to check</div>';
  h+='</div>';
  el.innerHTML=h;
  var inp=document.getElementById('tinp');
  if(inp)setTimeout(function(){inp.focus()},50);
}

function checkType(){
  var inp=document.getElementById('tinp');
  if(!inp)return;
  var v=inp.value.trim().toLowerCase();
  var correct=v===tw[ti].en.toLowerCase();
  if(correct)tscore++;
  inp.className='type-input '+(correct?'correct':'wrong');
  if(!correct)inp.value=tw[ti].en;
  setTimeout(function(){ti++;showTypeWord()},correct?600:1200);
}

/* ====== GRAMMAR ====== */
function renderGrammar(){
  var el=document.getElementById('grammar');
  var c=getGrammarCat();
  if(!c){el.innerHTML='<div style="text-align:center;color:#64748b;padding:20px">No grammar data</div>';return}
  var h='<div style="font-size:16px;font-weight:800;margin-bottom:12px">English Grammar</div>';
  for(var i=0;i<c.words.length;i++){
    var w=c.words[i];
    var title=w[0];
    var body=w[1];
    var lvlMatch=body.match(/LEVEL:\s*(\w+)/);
    var lvl=lvlMatch?lvlMatch[1]:'';
    var lvlColor=lvl==='A1'?'#10b981':lvl==='A2'?'#22c55e':lvl==='B1'?'#eab308':'#f97316';
    h+='<div class="g-item" id="gi'+i+'">';
    h+='<div class="g-hdr" onclick="toggleGrammar('+i+')">';
    h+='<div style="display:flex;align-items:center;gap:8px">';
    h+='<span class="g-title">'+title+'</span>';
    if(lvl)h+='<span style="background:'+lvlColor+';color:#fff;font-size:9px;font-weight:700;padding:2px 8px;border-radius:8px">'+lvl+'</span>';
    h+='</div><span class="g-arrow">&#9660;</span></div>';
    h+='<div class="g-body">'+formatGrammar(body)+'</div>';
    h+='</div>';
  }
  el.innerHTML=h;
}

function formatGrammar(t){
  var h='';
  // Formula
  var fm=t.match(/FORMULA:\s*([^|]+)/);
  if(fm)h+='<div class="gf-box"><div class="gf-label">Formula</div><div class="gf-val">'+fm[1].trim()+'</div></div>';
  // Positive
  var pos=t.match(/\+:\s*([^|]+)/);
  if(pos)h+='<div class="gf-box gf-pos"><div class="gf-label" style="color:#10b981">Positive (+)</div><div class="gf-val">'+pos[1].trim()+'</div></div>';
  // Negative
  var neg=t.match(/-:\s*([^|]+)/);
  if(neg)h+='<div class="gf-box gf-neg"><div class="gf-label" style="color:#ef4444">Negative (-)</div><div class="gf-val">'+neg[1].trim()+'</div></div>';
  // Question
  var qst=t.match(/\?:\s*([^|]+)/);
  if(qst)h+='<div class="gf-box gf-qst"><div class="gf-label" style="color:#f59e0b">Question (?)</div><div class="gf-val">'+qst[1].trim()+'</div></div>';
  // Signal words
  var kw=t.match(/Ключевые слова:\s*([^\.]+)\./);
  if(kw){
    var words=kw[1].split(',').map(function(s){return s.trim()});
    h+='<div style="margin-top:10px"><div class="gf-label">Signal Words</div><div style="display:flex;flex-wrap:wrap;gap:4px;margin-top:4px">';
    for(var i=0;i<words.length;i++){
      h+='<span style="background:rgba(99,102,241,.1);border:1px solid rgba(99,102,241,.15);border-radius:8px;padding:3px 8px;font-size:10px;color:#818cf8;font-weight:600">'+escHtml(words[i])+'</span>';
    }
    h+='</div></div>';
  }
  // Russian explanation
  var ru=t.match(/RUSSIAN:\s*([\s\S]+?)(?=Ключевые слова:|Примеры:|Важно:|$)/);
  if(ru){
    var txt=ru[1].replace(/\|\s*/g,' ').trim();
    h+='<div style="margin-top:10px"><div class="gf-label">Explanation</div><div style="font-size:12px;color:#94a3b8;line-height:1.7;margin-top:4px">'+escHtml(txt)+'</div></div>';
  }
  // Examples
  var ex=t.match(/Примеры:\s*([\s\S]+?)(?=Важно:|Краткий ответ:|$)/);
  if(ex){
    var exList=ex[1].split(';');
    h+='<div style="margin-top:10px"><div class="gf-label">Examples</div>';
    for(var i=0;i<exList.length;i++){
      var s=exList[i].trim();
      if(!s)continue;
      h+='<div style="font-size:12px;color:#e2e8f0;margin-top:4px;padding:6px 10px;background:rgba(255,255,255,.03);border-radius:8px;border-left:3px solid #6366f1">'+escHtml(s)+'</div>';
    }
    h+='</div>';
  }
  // Important note
  var imp=t.match(/Важно:\s*([^\.]+)\./);
  if(imp)h+='<div style="margin-top:10px;padding:8px 12px;background:rgba(245,158,11,.08);border:1px solid rgba(245,158,11,.15);border-radius:8px;font-size:11px;color:#f59e0b">⚠ '+escHtml(imp[1].trim())+'</div>';
  // Short answer
  var sa=t.match(/Краткий ответ:\s*([^\.]+)/);
  if(sa)h+='<div style="margin-top:8px;padding:8px 12px;background:rgba(16,185,129,.08);border:1px solid rgba(16,185,129,.15);border-radius:8px;font-size:11px;color:#10b981">✓ Short: '+escHtml(sa[1].trim())+'</div>';
  return h;
}

function toggleGrammar(i){
  var el=document.getElementById('gi'+i);
  if(el)el.classList.toggle('open');
}

/* ====== ME ====== */
function renderMe(){
  var el=document.getElementById('me');
  var known=getKnownMap();
  var totalWords=0;for(var i=0;i<G.length;i++){if(G[i].id!=='Grammar')totalWords+=G[i].words.length}
  var knownCount=0;for(var k in known)if(known[k])knownCount++;
  var notes=lsGetObj('eg_notes',[]);

  var h='<div class="me-stats">';
  h+='<div class="me-stat"><div class="ms-n">'+totalWords+'</div><div class="ms-l">Total words</div></div>';
  h+='<div class="me-stat"><div class="ms-n">'+knownCount+'</div><div class="ms-l">Known</div></div>';
  h+='<div class="me-stat"><div class="ms-n">'+notes.length+'</div><div class="ms-l">Notes</div></div>';
  h+='</div>';

  h+='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">';
  h+='<b style="font-size:14px">Notes</b>';
  h+='</div>';

  if(!notes.length)h+='<div style="text-align:center;color:#4a5568;padding:16px;font-size:12px">No notes yet</div>';

  for(var i=notes.length-1;i>=0;i--){
    var n=notes[i];
    h+='<div class="note-item"><button class="n-del" onclick="delNote('+i+')">&#10005;</button>';
    h+='<div class="n-txt">'+escHtml(n.t)+'</div>';
    h+='<div class="n-dt">'+n.d+'</div></div>';
  }
  h+='<button class="note-add" onclick="openNoteModal()">+ Add Note</button>';
  el.innerHTML=h;
}

function delNote(i){
  var notes=lsGetObj('eg_notes',[]);
  notes.splice(i,1);lsSetObj('eg_notes',notes);renderMe();
}

function openNoteModal(){
  var d=document.createElement('div');d.className='modal-bg';d.id='nmod';
  d.innerHTML='<div class="modal-box"><textarea id="ntxt" placeholder="Write a note..."></textarea><div class="mbtns"><button class="mbtn cancel" onclick="closeNoteModal()">Cancel</button><button class="mbtn save" onclick="saveNote()">Save</button></div></div>';
  document.body.appendChild(d);
  setTimeout(function(){var t=document.getElementById('ntxt');if(t)t.focus()},50);
}

function closeNoteModal(){var m=document.getElementById('nmod');if(m)m.remove()}

function saveNote(){
  var t=(document.getElementById('ntxt')||{}).value||'';
  if(!t.trim())return;
  var notes=lsGetObj('eg_notes',[]);
  notes.push({t:t.trim(),d:new Date().toLocaleDateString()});
  lsSetObj('eg_notes',notes);closeNoteModal();renderMe();
}

function escHtml(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}

/* ====== THEME ====== */
var themes=[
  {id:'',name:'Purple',color:'#6366f1'},
  {id:'theme-ocean',name:'Ocean',color:'#0ea5e9'},
  {id:'theme-emerald',name:'Emerald',color:'#10b981'},
  {id:'theme-rose',name:'Rose',color:'#f43f5e'},
  {id:'theme-amber',name:'Amber',color:'#f59e0b'},
  {id:'theme-indigo',name:'Indigo',color:'#818cf8'},
  {id:'theme-light',name:'Light',color:'#e2e8f0'}
];

function applyTheme(cls){
  document.body.className=cls||'';
  lsSet('eg_theme',cls||'');
}

function openThemePicker(){
  var cur=lsGet('eg_theme','');
  var d=document.createElement('div');d.className='tp-overlay';d.id='tpick';
  var h='<div class="tp-box"><h3>Choose Theme</h3><p>Pick a color scheme</p><div class="tp-grid">';
  for(var i=0;i<themes.length;i++){
    var t=themes[i];
    h+='<div class="tp-dot'+(cur===t.id?' sel':'')+'" style="background:'+t.color+'" onclick="applyTheme(\''+t.id+'\');closeThemePicker()" title="'+t.name+'"></div>';
  }
  h+='</div><button class="tp-close" onclick="closeThemePicker()">Done</button></div>';
  d.innerHTML=h;
  document.body.appendChild(d);
}

function closeThemePicker(){var m=document.getElementById('tpick');if(m)m.remove()}

/* ====== INIT ====== */
function init(){
  var yr=document.getElementById('yr');
  if(yr)yr.textContent='';
  applyTheme(lsGet('eg_theme',''));
  renderBrowse();
}
init();
</script>
